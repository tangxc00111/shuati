<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#102a43">
  <title>气田数字化运维中级工 · 刷题助手</title>
  <style>
:root{--navy:#102a43;--blue:#176fae;--sky:#eaf5fb;--paper:#fff;--ink:#183143;--muted:#668093;--line:#dbe7ee;--yellow:#ffe16a;--green:#16834d;--greenbg:#e7f7ee;--red:#c53a3a;--redbg:#fff0f0;--orange:#ef8c2f;--purple:#7256b8;--shadow:0 18px 55px rgba(16,42,67,.12)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(140deg,#f5fafc,#e9f4f9 60%,#f8fbfc)}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 8% 8%,rgba(23,111,174,.11),transparent 26%),radial-gradient(circle at 92% 92%,rgba(239,140,47,.09),transparent 24%)}button,input,select{font:inherit}.hidden{display:none!important}.app{position:relative;max-width:1080px;margin:auto;padding:24px 20px 44px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{display:flex;gap:11px;align-items:center;border:0;background:none;color:var(--navy);text-align:left;cursor:pointer;padding:0}.brand-badge{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--navy);color:white;font-weight:900;box-shadow:0 8px 20px rgba(16,42,67,.22)}.brand strong{display:block;font-size:19px}.brand small{display:block;margin-top:3px;color:var(--muted)}.top-actions{display:flex;align-items:center;gap:10px}.saved{font-size:12px;color:var(--muted)}.panel{background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.85);border-radius:23px;box-shadow:var(--shadow);overflow:hidden}.ghost,.secondary{border:1px solid var(--line);background:white;color:var(--navy);padding:10px 15px;border-radius:12px;cursor:pointer}.primary{border:0;background:linear-gradient(135deg,#1e7dbb,#115983);color:white;font-weight:850;padding:13px 22px;border-radius:13px;cursor:pointer;box-shadow:0 8px 20px rgba(23,111,174,.24)}.primary:hover,.secondary:hover,.ghost:hover{transform:translateY(-1px)}
.hero{min-height:205px;padding:34px 38px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(125deg,var(--navy),#175780);color:white}.eyebrow{font-size:12px;letter-spacing:.18em;color:#90d0f2;font-weight:850}.hero h1{font-size:34px;margin:10px 0 9px}.hero p{margin:0;color:#c8deeb}.hero-number{font-size:112px;font-weight:950;color:rgba(255,255,255,.08);line-height:1}.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.dash-card{display:flex;align-items:center;gap:12px;text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.92);border-radius:17px;padding:16px;cursor:pointer;box-shadow:0 8px 24px rgba(16,42,67,.06)}.dash-card:hover{border-color:#96bed4;transform:translateY(-2px)}.dash-icon{width:42px;height:42px;flex:none;border-radius:13px;display:grid;place-items:center;background:var(--sky);color:var(--blue);font-weight:900}.dash-card b,.dash-card small{display:block}.dash-card b{font-size:15px}.dash-card small{margin-top:4px;color:var(--muted);font-size:12px}.dash-card em{font-style:normal;font-weight:850;color:var(--navy)}.dash-card.wrong .dash-icon{background:var(--redbg);color:var(--red)}.dash-card.chosen .dash-icon{background:#f1ecff;color:var(--purple)}.dash-card.slain .dash-icon{background:#f2f1ef;color:#665f57}
.setup{padding:28px 34px 32px}.setup-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.setup-title h2{margin:0;font-size:23px}.setup-title p{margin:5px 0 0;color:var(--muted);font-size:13px}.mode-switch{background:#edf3f6;padding:4px;border-radius:12px;display:flex}.mode{border:0;background:transparent;color:var(--muted);padding:8px 17px;border-radius:9px;cursor:pointer;font-weight:750}.mode.active{background:white;color:var(--blue);box-shadow:0 3px 10px rgba(16,42,67,.09)}.setup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.setup-grid label{font-size:12px;font-weight:800;color:#456273}.setup-grid select,.library-tools select,.library-tools input{width:100%;margin-top:7px;padding:11px 12px;border:1px solid var(--line);background:white;border-radius:11px;color:var(--ink);outline:none}.label-row{display:flex;justify-content:space-between;margin:20px 0 9px;font-size:12px;font-weight:800;color:#456273}.text-btn{border:0;background:none;color:var(--blue);cursor:pointer}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#f8fbfc;color:#4c697a;padding:7px 11px;border-radius:999px;cursor:pointer;font-size:12px}.chip.active{background:var(--sky);border-color:#8dc0dd;color:#126496;font-weight:750}.start-row{display:flex;align-items:center;gap:10px;margin-top:25px}.kbd-tip{font-size:11px;color:var(--muted);margin-left:auto}
.study-shell{padding:25px 30px 32px}.progress-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:14px;font-size:12px;color:var(--muted)}.progress-track{height:8px;border-radius:99px;background:#e7eef2;overflow:hidden}.progress{height:100%;background:linear-gradient(90deg,var(--blue),#44a6db);width:0;transition:.25s}.timer{height:4px;background:#eef2f4;margin:16px -30px 22px;overflow:hidden}.timer-bar{height:100%;background:var(--orange);transform-origin:left;animation:count 2s linear forwards}@keyframes count{to{transform:scaleX(0)}}.question-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.type-label{font-size:13px;font-weight:850;color:var(--blue)}.item-actions{display:flex;gap:6px}.mini{border:1px solid var(--line);background:#fafcfd;color:#526d7d;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:12px}.mini.active{background:#eee9ff;color:var(--purple);border-color:#b8a9e6}.mini.danger{color:#8a5555}.mini.danger:hover{background:var(--redbg);border-color:#e1aaaa;color:var(--red)}.question{font-size:23px;line-height:1.6;font-weight:780;margin:20px 0 22px}.question mark{background:var(--yellow);color:var(--ink);padding:1px 4px;border-radius:4px;box-decoration-break:clone;-webkit-box-decoration-break:clone}.question-image{display:block;max-width:155px;max-height:130px;border:1px solid var(--line);border-radius:13px;padding:7px;margin:0 0 15px;background:white}.options{display:grid;gap:11px}.option{display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:center;text-align:left;border:1px solid var(--line);background:#fbfdfe;color:var(--ink);padding:13px 15px;border-radius:14px;cursor:pointer}.option:hover{border-color:#8ebdd6;background:#f2f9fc;transform:translateX(2px)}.option .key{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;background:#eaf1f5;color:#496878;font-weight:900}.option.correct{background:var(--greenbg);border-color:#54ad7b}.option.correct .key{background:var(--green);color:white}.option.wrong{background:var(--redbg);border-color:#df7c7c}.option.wrong .key{background:var(--red);color:white}.option:disabled{cursor:default;transform:none}.feedback{display:none;margin-top:19px;border:1px solid var(--line);background:#f8fbfc;border-radius:15px;padding:17px 19px}.feedback.show{display:block}.feedback-top{display:flex;justify-content:space-between;font-size:13px;font-weight:800}.yes{color:var(--green)}.no{color:var(--red)}.mnemonic{font-size:19px;font-weight:850;color:var(--navy);margin-top:8px}.memory-tip{margin-top:9px;padding-top:9px;border-top:1px dashed #cedde5;color:#34596e;font-size:14px}.trigger-note{font-size:11px;color:var(--muted);margin-top:6px}.next-row{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}.next-row button:disabled{opacity:.45;cursor:not-allowed;transform:none}
.memory-kind{display:inline-block;margin-left:8px;padding:5px 9px;border-radius:99px;font-size:11px;font-weight:800;background:#f2f4f5;color:#5c6b73}.memory-kind[data-type="direct"]{background:#fff0b8;color:#725300}.memory-kind[data-type="common"]{background:#e6f5eb;color:#31704b}.memory-kind[data-type="logic"]{background:#e8efff;color:#365f9e}.memory-kind[data-type="simple"]{background:#eef2f4;color:#60727b}.memory-kind[data-type="rote"]{background:#f7e8ee;color:#8b435f}
.reveal{width:100%;border:1px dashed #90b9cf;background:#f2f9fc;border-radius:17px;padding:24px;color:var(--navy);cursor:pointer}.reveal b,.reveal span{display:block}.reveal b{font-size:18px}.reveal span{font-size:12px;color:var(--muted);margin-top:5px}.memory-answer{display:grid;gap:13px}.teach{border-radius:16px;padding:17px 19px;background:#fffaf0;border:1px solid #eed9aa}.teach span{display:block;font-size:11px;font-weight:850;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}.teach strong{font-size:18px;color:#63480f}.teach p{margin:8px 0 0;color:#755a27}.rating{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.rating button{border:1px solid var(--line);background:white;border-radius:13px;padding:12px;cursor:pointer;font-weight:800}.rating button:hover{border-color:#91bad0;background:#f5fafc}.rating small{font-weight:400;color:var(--muted)}
.library-head{display:flex;justify-content:space-between;align-items:center;padding:25px 28px 18px;border-bottom:1px solid var(--line)}.library-head h2{margin:0}.library-head p{margin:5px 0 0;color:var(--muted);font-size:13px}.library-tools{display:grid;grid-template-columns:1.5fr .6fr .8fr;gap:10px;padding:17px 28px}.library-tools input,.library-tools select{margin:0}.batch{display:flex;align-items:center;gap:8px;padding:0 28px 14px}.batch button{border:1px solid var(--line);background:#f8fafb;border-radius:9px;padding:7px 10px;cursor:pointer;font-size:12px}.batch span{margin-left:auto;font-size:12px;color:var(--muted)}.question-list{height:500px;overflow:auto;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.list-item{display:grid;grid-template-columns:28px 70px 1fr auto;align-items:start;gap:10px;padding:13px 28px;border-bottom:1px solid #edf2f5}.list-item:hover{background:#f8fbfc}.list-item input{margin-top:4px;width:17px;height:17px}.list-no{font-size:12px;font-weight:800;color:var(--blue)}.list-text{font-size:13px;line-height:1.5}.list-text small{display:block;color:var(--muted);margin-top:3px}.list-actions{display:flex;gap:5px}.list-actions button{border:1px solid var(--line);background:white;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:11px}.library-footer{display:flex;justify-content:flex-end;gap:9px;padding:16px 28px}.empty{padding:45px;text-align:center;color:var(--muted)}
.result{text-align:center;padding:46px 30px}.score-ring{width:145px;height:145px;border-radius:50%;display:grid;place-items:center;margin:0 auto 20px;background:conic-gradient(var(--green) var(--score),#e7eef2 0);position:relative}.score-ring:before{content:"";position:absolute;inset:11px;border-radius:50%;background:white}.score-ring div{position:relative}.score-ring strong,.score-ring span{display:block}.score-ring strong{font-size:36px}.score-ring span{font-size:11px;color:var(--muted)}.result h2{margin:0 0 8px}.result p{color:var(--muted)}.result button{margin:7px 4px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,120px);opacity:0;background:var(--navy);color:white;border-radius:13px;padding:11px 14px;box-shadow:var(--shadow);transition:.25s;display:flex;gap:14px;align-items:center;z-index:10}.toast.show{transform:translate(-50%,0);opacity:1}.toast button{border:0;background:var(--yellow);color:var(--navy);font-weight:800;border-radius:8px;padding:5px 8px;cursor:pointer}
@media(max-width:760px){.app{padding:13px 11px 30px}.saved{display:none}.brand strong{font-size:16px}.brand small{display:none}.hero{padding:27px 22px;min-height:185px}.hero h1{font-size:27px}.hero-number{font-size:70px}.dashboard{grid-template-columns:1fr 1fr}.dash-card{padding:12px}.setup{padding:22px}.setup-title{align-items:flex-start;gap:10px}.setup-title p{display:none}.setup-grid{grid-template-columns:1fr}.start-row{flex-wrap:wrap}.start-row .primary,.start-row .secondary{flex:1}.kbd-tip{display:none}.study-shell{padding:18px}.progress-row{grid-template-columns:1fr auto}.progress-row span{display:none}.timer{margin:14px -18px 18px}.question-head{align-items:flex-start}.item-actions{flex-wrap:wrap;justify-content:flex-end}.mini{font-size:11px;padding:6px 8px}.question{font-size:20px}.feedback-top{display:block}.rating{grid-template-columns:1fr}.library-tools{grid-template-columns:1fr;padding:14px 17px}.library-head{padding:18px}.batch{padding:0 17px 12px;flex-wrap:wrap}.batch span{width:100%;margin:0}.question-list{height:58vh}.list-item{grid-template-columns:24px 55px 1fr;padding:12px 16px}.list-actions{grid-column:3}.library-footer{padding:13px 17px}.dashboard .dash-icon{width:36px;height:36px}.top-actions .ghost{padding:8px 11px}}

.dashboard{grid-template-columns:repeat(5,1fr)}
.dash-card{padding:14px}
.dash-card.analysis .dash-icon{background:#fff4d8;color:#9a6810}
.memory-options{display:grid;gap:8px}
.memory-option{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center;border:1px solid var(--line);background:#fbfdfe;border-radius:12px;padding:10px 13px}
.memory-option b{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:#eaf1f5;color:#496878}
.memory-option.correct{background:var(--greenbg);border-color:#75b991}
.memory-option.correct b{background:var(--green);color:white}
.list-actions{flex-wrap:wrap;justify-content:flex-end}
.list-actions .start-here{color:var(--blue);border-color:#a8cbdc;background:#f4fafc}
.analysis-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:22px 28px;background:#f7fafc;border-bottom:1px solid var(--line)}
.analysis-stats div{background:white;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.analysis-stats strong,.analysis-stats span{display:block}.analysis-stats strong{font-size:28px;color:var(--navy)}.analysis-stats span{font-size:11px;color:var(--muted);margin-top:3px}
.analysis-layout{display:grid;gap:18px;padding:24px 28px 30px}.analysis-block{border:1px solid var(--line);border-radius:17px;overflow:hidden}
.block-title{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;background:#f8fbfc;border-bottom:1px solid var(--line)}
.block-title h3{margin:0;font-size:17px}.block-title p{margin:4px 0 0;font-size:12px;color:var(--muted)}.analysis-list{display:grid}
.analysis-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:13px 18px;border-bottom:1px solid #edf2f5}.analysis-item:last-child{border-bottom:0}
.analysis-item b,.analysis-item small{display:block}.analysis-item b{font-size:14px}.analysis-item small{margin-top:4px;color:var(--muted);line-height:1.45}
.analysis-item button{border:1px solid #a8cbdc;background:#f3f9fc;color:var(--blue);border-radius:9px;padding:7px 10px;cursor:pointer;font-size:12px}
@media(max-width:760px){.dashboard{grid-template-columns:1fr 1fr}.list-actions{justify-content:flex-start}.analysis-stats{grid-template-columns:1fr 1fr;padding:15px}.analysis-layout{padding:16px}.block-title{align-items:flex-start}.analysis-item{grid-template-columns:1fr}.analysis-item button{justify-self:start}}
.option.selected{background:#e9f2ff;border-color:#4f8fd1;box-shadow:0 0 0 2px rgba(79,143,209,.14)}
.option.selected .key{background:#397dbd;color:white}
.multi-submit{margin-top:4px}
.self-rate{border:1px solid var(--line);background:white;border-radius:13px;padding:14px;cursor:pointer;font-weight:850}
.yes-rate{color:var(--green);border-color:#91caaa}
.no-rate{color:var(--red);border-color:#e1aaaa}
.mnemonic{white-space:pre-wrap;line-height:1.75}

  </style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <button class="brand" id="brandHome" type="button" aria-label="返回首页"><span class="brand-badge">刷</span><span><strong>气田数字化运维中级工</strong><small>刷题助手</small></span></button>
    <div class="top-actions"><span class="saved" id="savedHint">本机自动保存</span><button class="ghost" id="homeBtn" type="button">首页</button></div>
  </header>

  <section id="homeView" class="view">
    <div class="hero panel"><div><div class="eyebrow">MUSCLE MEMORY LAB</div><h1 id="heroQuote">会的斩掉，不会的反复狠狠干。</h1><p>刷题、背题、错题和断点进度都保存在当前浏览器。</p></div><div class="hero-number">800</div></div>
    <div class="dashboard">
      <button class="dash-card analysis" id="analysisCard" type="button"><span class="dash-icon">析</span><span><b>题库分析</b><small><em id="highFreqCount">0</em> 个高频考点</small></span></button>
      <button class="dash-card continue" id="continueCard" type="button"><span class="dash-icon">▶</span><span><b>继续上次</b><small id="continueText">暂无未完成训练</small></span></button>
      <button class="dash-card wrong" id="wrongCard" type="button"><span class="dash-icon">错</span><span><b>错题本</b><small><em id="wrongCount">0</em> 道待消灭</small></span></button>
      <button class="dash-card chosen" id="favoriteCard" type="button"><span class="dash-icon">★</span><span><b>我的收藏</b><small><em id="favoriteCount">0</em> 道已收藏</small></span></button>
      <button class="dash-card slain" id="slainCard" type="button"><span class="dash-icon">斩</span><span><b>已斩题库</b><small><em id="slainCount">0</em> 道不再出现</small></span></button>
    </div>

    <div class="panel setup">
      <div class="setup-title"><div><h2>开一轮训练</h2><p>背题会直接教记法；刷题会先让你作答。</p></div><div class="mode-switch"><button class="mode active" data-mode="quiz" type="button">刷题</button><button class="mode" data-mode="memory" type="button">背题</button></div></div>
      <div class="setup-grid">
        <label>题型<select id="typeSelect"><option value="all">全部题型</option><option value="mcq" selected>只练单选</option><option value="multi">只练多选</option><option value="tf">只练判断</option></select></label>
        <label>顺序<select id="orderSelect"><option value="random">随机乱序</option><option value="sequence" selected>按题号顺序</option></select></label>
        <label>本轮题数<select id="countSelect"><option value="20">20 题</option><option value="50">50 题</option><option value="100">100 题</option><option value="all" selected>全部</option></select></label>
      </div>
      <div class="start-row"><button class="primary" id="startBtn" type="button">开始刷题</button><button class="secondary" id="libraryBtn" type="button">打开题库选择器</button><span class="kbd-tip">快捷键：1–4 选择，↑ 上一题，↓ 下一题</span></div>
    </div>
  </section>

  <section id="studyView" class="view panel hidden">
    <div class="study-shell">
      <div class="progress-row"><div class="progress-track"><div class="progress" id="progress"></div></div><strong id="position">1 / 50</strong><span id="scoreStat">正确 0 · 错题 0</span></div>
      <div class="timer"><div class="timer-bar" id="timerBar"></div></div>
      <div class="question-head"><div><span class="type-label" id="qLabel">单选题 #1</span><span class="memory-kind" id="memoryTypeBadge" data-type="simple">简单</span></div><div class="item-actions"><button class="mini" id="favoriteBtn" type="button">☆ 收藏</button><button class="mini danger" id="slayBtn" type="button">⚔ 斩题</button></div></div>
      <div class="question" id="question"></div>
      <div id="quizArea"><div class="options" id="options"></div><div class="feedback" id="feedback"><div class="feedback-top"><strong id="verdict"></strong><span id="answerText"></span></div><div class="mnemonic" id="mnemonic"></div><div class="memory-tip" id="quizMemoryTip"></div><div class="trigger-note" id="triggerNote"></div></div><div class="next-row"><button class="secondary" id="prevBtn" type="button">← 上一题</button><button class="primary hidden" id="nextBtn" type="button">下一题 ↵</button></div></div>
      <div id="memoryArea" class="hidden"><div class="memory-answer" id="memoryAnswer"><div class="memory-options" id="memoryOptions"></div><div class="teach"><span>怎么记</span><strong id="memoryTip"></strong><p id="memoryMnemonic"></p></div><div class="next-row"><button class="secondary" id="memoryPrevBtn" type="button">← 上一题</button><button class="primary" id="memoryNextBtn" type="button">下一题 ↵</button></div></div></div>
    </div>
  </section>

  <section id="libraryView" class="view panel hidden">
    <div class="library-head"><div><h2 id="libraryTitle">题库选择器</h2><p id="librarySubtitle">勾选你想专门练习的题目。</p></div><button class="ghost" id="closeLibrary" type="button">返回首页</button></div>
    <div class="library-tools"><input id="searchInput" type="search" placeholder="搜索题干或题号"><select id="libraryType"><option value="all">全部题型</option><option value="mcq">单选题</option><option value="multi">多选题</option><option value="tf">判断题</option></select></div>
    <div class="batch"><button id="selectVisible" type="button">选择当前结果</button><button id="invertVisible" type="button">反选当前结果</button><button id="clearSelected" type="button">清空选择</button><span id="librarySummary"></span></div>
    <div class="question-list" id="questionList"></div>
    <div class="library-footer"><button class="primary" id="quizSelected" type="button">刷所选题目</button><button class="secondary" id="memorySelected" type="button">背所选题目</button></div>
  </section>

const views=$$('.view');

  {id:'direct',title:'题干直给',tip:'正确答案已在题干高亮，看到原文即可选择。',test:q=>memoryTypeOf(q)==='direct'},

function loadState(){try{const parsed=JSON.parse(localStorage.getItem(STORE_KEY)||'null');if(parsed)return Object.assign({},defaults,parsed)}catch(e){}return Object.assign({},defaults)}
function save(){state.wrong=[...wrong];state.selected=[...selected];state.favorites=[...favorites];state.slain=[...slain];try{localStorage.setItem(STORE_KEY,JSON.stringify(state));$('#savedHint').textContent='刚刚已保存';setTimeout(()=>$('#savedHint').textContent='本机自动保存',900)}catch(e){}refreshHome()}
function show(view){views.forEach(v=>v.classList.add('hidden'));view.classList.remove('hidden');window.scrollTo(0,0)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function memoryTypeOf(q){return MEMORY_META[q.memoryType]?q.memoryType:(q.trigger?'logic':'rote')}
function marked(text,terms){const list=[...new Set((Array.isArray(terms)?terms:[]).filter(Boolean))].sort((a,b)=>b.length-a.length);let parts=[{text:String(text),mark:false}];for(const term of list){parts=parts.flatMap(part=>{if(part.mark||!part.text.includes(term))return[part];const chunks=part.text.split(term),next=[];chunks.forEach((chunk,i)=>{if(chunk)next.push({text:chunk,mark:false});if(i<chunks.length-1)next.push({text:term,mark:true})});return next})}return parts.map(part=>part.mark?`<mark>${esc(part.text)}</mark>`:esc(part.text)).join('')}
function memoryGuide(q){const type=memoryTypeOf(q),highlight=(q.highlights||[]).join('、');if(type==='direct')return{headline:'题干已经给出答案',tip:q.memoryTip||`直接选择：${q.anchor}`,note:highlight?`高亮答案：${highlight}`:''};if(type==='common')return{headline:'常识题',tip:q.memoryTip||'按基本常识直接判断。',note:'无需硬找题眼。'};if(type==='logic')return{headline:q.mnemonic||'按逻辑判断',tip:q.logic||q.memoryTip||'根据题眼推导正确答案。',note:q.trigger?`题眼：${q.trigger}`:''};if(type==='simple')return{headline:'简单题',tip:q.memoryTip||'一眼即可判断，无需口诀。',note:'不强行设置题眼。'};return{headline:q.mnemonic||'这题需要硬记',tip:q.memoryTip||'直接绑定题干与官方答案。',note:q.trigger?`辅助线索：${q.trigger}`:''}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function labelOf(q){return({mcq:'单选题',multi:'多选题',tf:'判断题'}[q.type]||'题目')+' #'+q.id}
function answerOf(q){if(q.type==='mcq')return `${'ABCD'[q.correctIdx]} · ${q.options[q.correctIdx]}`;if(q.type==='multi')return q.correctIdxs.map(i=>'ABCD'[i]).join('')+' · '+q.correctIdxs.map(i=>q.options[i]).join('；');return q.answer?'√ 正确':'× 错误'}
function toast(text,undo=false){clearTimeout(toastTimer);$('#toastText').textContent=text;$('#undoBtn').style.display=undo?'inline-block':'none';$('#toast').classList.add('show');toastTimer=setTimeout(()=>$('#toast').classList.remove('show'),3300)}

function refreshHome(){
  $('#wrongCount').textContent=wrong.size;$('#favoriteCount').textContent=favorites.size;$('#slainCount').textContent=slain.size;
  const groups=computeAnalysis().high;$('#highFreqCount').textContent=groups.length;
  const s=state.session,card=$('#continueCard');
  if(s&&s.queue&&s.position<s.queue.length){card.disabled=false;const q=byKey.get(s.queue[s.position]);$('#continueText').textContent=`${s.mode==='memory'?'背题':'刷题'}到 ${q?labelOf(q):'下一题'} · ${s.position}/${s.queue.length}`}
  else{card.disabled=true;$('#continueText').textContent='暂无未完成训练'}
}
function configuredPool(){const type=$('#typeSelect').value;let pool=QUIZ_DATABASE.filter(q=>!slain.has(keyOf(q))&&(type==='all'||q.type===type));if($('#orderSelect').value==='random')shuffle(pool);const n=$('#countSelect').value;return n==='all'?pool:pool.slice(0,Number(n))}
function startSession(mode,questions,label='自定义训练'){
  const clean=questions.filter(q=>q&&!slain.has(keyOf(q)));if(!clean.length){alert('当前没有可训练的题目。');return}
  state.session={mode,queue:clean.map(keyOf),position:0,correct:0,wrongThis:[],remembered:0,repeats:{},responses:{},label};save();openSession();
}
function openSession(){if(!state.session)return;chosenMode=state.session.mode;show($('#studyView'));renderStudy()}
function continueSession(){if(state.session&&state.session.position<state.session.queue.length)openSession()}
function currentFromSession(){const s=state.session;while(s&&s.position<s.queue.length){const key=s.queue[s.position];if(!slain.has(key)&&byKey.has(key))return byKey.get(key);s.position++}return null}

function renderStudy(){
  const s=state.session;if(!s)return show($('#homeView'));s.responses||(s.responses={});currentQuestion=currentFromSession();if(!currentQuestion)return finishSession();answered=false;clearTimeout(timerHandle);
  const q=currentQuestion,pos=s.position;$('#position').textContent=`${pos+1} / ${s.queue.length}`;$('#progress').style.width=`${pos/s.queue.length*100}%`;$('#scoreStat').textContent=s.mode==='quiz'?`正确 ${s.correct} · 错题 ${s.wrongThis.length}`:`已背 ${pos} · 共 ${s.queue.length}`;$('#prevBtn').disabled=pos===0;$('#memoryPrevBtn').disabled=pos===0;
  const memoryType=memoryTypeOf(q);$('#qLabel').textContent=labelOf(q);$('#memoryTypeBadge').textContent=MEMORY_META[memoryType];$('#memoryTypeBadge').dataset.type=memoryType;$('#question').innerHTML=(q.image?`<img class="question-image" src="${q.image}" alt="原题安全标识">`:'')+marked(q.question,q.highlights);
  refreshItemActions();const bar=$('#timerBar');bar.style.animation='none';void bar.offsetWidth;bar.style.animation='';timerHandle=setTimeout(()=>{},2000);
  $('#quizArea').classList.toggle('hidden',s.mode!=='quiz');$('#memoryArea').classList.toggle('hidden',s.mode!=='memory');

function refreshItemActions(){const key=keyOf(currentQuestion);$('#favoriteBtn').classList.toggle('active',favorites.has(key));$('#favoriteBtn').textContent=favorites.has(key)?'★ 已收藏':'☆ 收藏'}
function renderQuiz(q){
  const s=state.session,response=s.responses&&s.responses[s.position],box=$('#options');box.innerHTML='';multiSelection=new Set(response&&response.choices||[]);$('#feedback').classList.remove('show');$('#nextBtn').classList.add('hidden');
  const opts=(q.type==='mcq'||q.type==='multi')?q.options:['正确（√）','错误（×）'];
  opts.forEach((text,i)=>{const b=document.createElement('button');b.type='button';b.className='option';b.innerHTML=`<span class="key">${q.type==='tf'?(i===0?'√':'×'):'ABCD'[i]}</span><span>${esc(text)}</span>`;if(q.type==='multi'){b.classList.toggle('selected',multiSelection.has(i));b.onclick=()=>{if(answered)return;multiSelection.has(i)?multiSelection.delete(i):multiSelection.add(i);b.classList.toggle('selected',multiSelection.has(i))}}else b.onclick=()=>answerQuiz(i);box.appendChild(b)});
  if(q.type==='multi'){const submit=document.createElement('button');submit.type='button';submit.className='primary multi-submit';submit.textContent='提交所选答案 ↵';submit.onclick=answerMulti;box.appendChild(submit)}
  if(response)restoreQuizResponse(q,response)
}
function showQuizFeedback(q,ok){const guide=memoryGuide(q);$('#verdict').innerHTML=ok?'<span class="yes">✓ 命中</span>':'<span class="no">× 记住这个坑</span>';$('#answerText').textContent='答案：'+answerOf(q);$('#mnemonic').textContent=guide.headline;$('#quizMemoryTip').textContent=guide.tip;$('#triggerNote').textContent=guide.note;$('#feedback').classList.add('show');$('#nextBtn').classList.remove('hidden')}
function restoreQuizResponse(q,response){answered=true;if(q.type==='multi'){const rights=new Set(q.correctIdxs),choices=new Set(response.choices||[]);$$('.option').forEach((b,i)=>{b.disabled=true;b.classList.remove('selected');if(rights.has(i))b.classList.add('correct');if(choices.has(i)&&!rights.has(i))b.classList.add('wrong')});const submit=$('.multi-submit');if(submit)submit.disabled=true}else{const right=q.type==='mcq'?q.correctIdx:(q.answer?0:1);$$('.option').forEach((b,i)=>{b.disabled=true;if(i===right)b.classList.add('correct');if(i===response.choice&&!response.ok)b.classList.add('wrong')})}showQuizFeedback(q,response.ok)}
function recordResult(ok,payload){const q=currentQuestion,s=state.session,key=keyOf(q),index=s.position;s.responses||(s.responses={});if(s.responses[index]){restoreQuizResponse(q,s.responses[index]);return}answered=true;s.responses[index]={ok,...payload};if(ok){s.correct++;wrong.delete(key)}else{wrong.add(key);if(!s.wrongThis.includes(key))s.wrongThis.push(key)}playFeedback(ok);showQuizFeedback(q,ok);save()}
function answerQuiz(choice){if(answered)return;const q=currentQuestion,right=q.type==='mcq'?q.correctIdx:(q.answer?0:1),ok=choice===right,buttons=$$('.option');buttons.forEach((b,i)=>{b.disabled=true;if(i===right)b.classList.add('correct');if(i===choice&&!ok)b.classList.add('wrong')});recordResult(ok,{choice})}
function answerMulti(){if(answered)return;if(!multiSelection.size){alert('请至少选择一项。');return}const q=currentQuestion,rights=new Set(q.correctIdxs),choices=[...multiSelection].sort((a,b)=>a-b),ok=choices.length===rights.size&&choices.every(i=>rights.has(i));$$('.option').forEach((b,i)=>{b.disabled=true;b.classList.remove('selected');if(rights.has(i))b.classList.add('correct');if(multiSelection.has(i)&&!rights.has(i))b.classList.add('wrong')});const submit=$('.multi-submit');if(submit)submit.disabled=true;recordResult(ok,{choices})}
function previousQuestion(){const s=state.session;if(!s||s.position<=0)return;s.position--;save();renderStudy()}
function nextQuiz(){if(answered!==true)return;state.session.position++;save();renderStudy()}
function renderMemory(q){const guide=memoryGuide(q),opts=(q.type==='mcq'||q.type==='multi')?q.options:['正确（√）','错误（×）'],rights=q.type==='multi'?new Set(q.correctIdxs):new Set([q.type==='mcq'?q.correctIdx:(q.answer?0:1)]);$('#memoryOptions').innerHTML=opts.map((text,i)=>`<div class="memory-option ${rights.has(i)?'correct':''}"><b>${q.type==='tf'?(i===0?'√':'×'):'ABCD'[i]}</b><span>${esc(text)}</span></div>`).join('');$('#memoryTip').textContent=guide.headline;$('#memoryMnemonic').textContent=[guide.tip,guide.note].filter(Boolean).join(' · ')}
function nextMemory(){if(!state.session||state.session.mode!=='memory')return;state.session.position++;save();renderStudy()}
function playFeedback(ok){try{const Audio=window.AudioContext||window.webkitAudioContext;if(!Audio)return;const ctx=playFeedback.ctx||(playFeedback.ctx=new Audio());if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime,notes=ok?[523.25,659.25]:[329.63,277.18];notes.forEach((freq,i)=>{const osc=ctx.createOscillator(),gain=ctx.createGain(),start=now+i*.075;osc.type='sine';osc.frequency.setValueAtTime(freq,start);gain.gain.setValueAtTime(.0001,start);gain.gain.exponentialRampToValueAtTime(ok?0.028:0.022,start+.018);gain.gain.exponentialRampToValueAtTime(.0001,start+.13);osc.connect(gain).connect(ctx.destination);osc.start(start);osc.stop(start+.14)})}catch(e){}}
function finishSession(){
  const s=state.session;if(!s)return;state.session=null;save();show($('#resultView'));const total=Math.max(1,s.queue.length),score=s.mode==='quiz'?s.correct:total,pct=Math.round(score/total*100);$('#scorePct').textContent=pct+'%';$('#scoreRing').style.setProperty('--score',pct*3.6+'deg');$('#resultTitle').textContent=s.mode==='quiz'?'本轮刷完了':'本轮背完了';$('#resultDetail').textContent=s.mode==='quiz'?`答对 ${s.correct} 题，本轮错题 ${s.wrongThis.length} 道；错题本现有 ${wrong.size} 道。`:`本轮已浏览 ${total} 道题，答案与记法均已展示。`;$('#retryWrongBtn').style.display=s.mode==='quiz'&&s.wrongThis.length?'inline-block':'none';$('#retryWrongBtn').onclick=()=>startSession('quiz',s.wrongThis.map(k=>byKey.get(k)),'重刷本轮错题')
}

function toggleFavoriteCurrent(){const key=keyOf(currentQuestion);favorites.has(key)?favorites.delete(key):favorites.add(key);save();refreshItemActions()}
function slayCurrent(){const q=currentQuestion,key=keyOf(q);lastSlain={key,q,wasWrong:wrong.has(key),wasSelected:selected.has(key)};slain.add(key);wrong.delete(key);selected.delete(key);if(state.session&&state.session.queue[state.session.position]===key)state.session.position++;save();toast(`已斩：${labelOf(q)}，以后默认不再出现。`,true);renderStudy()}
function undoSlay(){if(!lastSlain)return;slain.delete(lastSlain.key);if(lastSlain.wasWrong)wrong.add(lastSlain.key);if(lastSlain.wasSelected)selected.add(lastSlain.key);const restored=lastSlain.q;lastSlain=null;save();if(!$('#libraryView').classList.contains('hidden'))renderLibrary();toast(`已恢复：${labelOf(restored)}`)}

function libraryBase(){if(libraryContext==='wrong')return [...wrong].map(k=>byKey.get(k)).filter(Boolean);if(libraryContext==='favorites')return [...favorites].map(k=>byKey.get(k)).filter(Boolean);if(libraryContext==='slain')return [...slain].map(k=>byKey.get(k)).filter(Boolean);return QUIZ_DATABASE.filter(q=>!slain.has(keyOf(q)))}
function openLibrary(context='all'){
  libraryContext=context;const meta={all:['题库选择器','勾选题目，组成自己的专属训练。'],wrong:['错题本',`共 ${wrong.size} 道错题，答对后自动移出。`],favorites:['我的收藏',`共收藏 ${favorites.size} 道题。`],slain:['已斩题库',`共斩掉 ${slain.size} 道题，可随时恢复。`]};$('#libraryTitle').textContent=meta[context][0];$('#librarySubtitle').textContent=meta[context][1];$('#quizSelected').textContent=context==='wrong'?'刷当前错题':context==='favorites'?'刷收藏题':'刷所选题目';$('#memorySelected').textContent=context==='wrong'?'背当前错题':context==='favorites'?'背收藏题':'背所选题目';$('#quizSelected').style.display=context==='slain'?'none':'inline-block';$('#memorySelected').style.display=context==='slain'?'none':'inline-block';$('#searchInput').value='';$('#libraryType').value='all';show($('#libraryView'));renderLibrary();
}
function filteredLibrary(){const term=$('#searchInput').value.trim().toLowerCase(),type=$('#libraryType').value;return libraryBase().filter(q=>(type==='all'||q.type===type)&&(!term||q.question.toLowerCase().includes(term)||String(q.id)===term||labelOf(q).toLowerCase().includes(term)))}
function renderLibrary(){
  const list=filteredLibrary();visibleLibraryKeys=list.map(keyOf);$('#librarySummary').textContent=`当前 ${list.length} 题 · 已选择 ${selected.size} 题`;const box=$('#questionList');box.innerHTML='';if(!list.length){box.innerHTML='<div class="empty">这里暂时没有题目。</div>';return}
  const frag=document.createDocumentFragment();for(const [rowIndex,q] of list.entries()){const key=keyOf(q),row=document.createElement('div');row.className='list-item';const check=document.createElement('input');check.type='checkbox';check.checked=selected.has(key);check.onchange=()=>{check.checked?selected.add(key):selected.delete(key);save();$('#librarySummary').textContent=`当前 ${list.length} 题 · 已选择 ${selected.size} 题`};const no=document.createElement('div');no.className='list-no';no.textContent=labelOf(q);const text=document.createElement('div');text.className='list-text';text.innerHTML=esc(q.question)+`<small>答案 ${esc(q.anchor)}</small>`;const actions=document.createElement('div');actions.className='list-actions';if(libraryContext!=='slain'){const fromQuiz=document.createElement('button');fromQuiz.className='start-here';fromQuiz.textContent='从此刷';fromQuiz.onclick=()=>startSession('quiz',list.slice(rowIndex),`从 ${labelOf(q)} 开始`);const fromMemory=document.createElement('button');fromMemory.className='start-here';fromMemory.textContent='从此背';fromMemory.onclick=()=>startSession('memory',list.slice(rowIndex),`从 ${labelOf(q)} 开始`);actions.append(fromQuiz,fromMemory)}const fav=document.createElement('button');fav.textContent=favorites.has(key)?'★':'☆';fav.title='收藏';fav.onclick=()=>{favorites.has(key)?favorites.delete(key):favorites.add(key);save();renderLibrary()};const action=document.createElement('button');action.textContent=libraryContext==='slain'?'恢复':'斩题';action.onclick=()=>{if(libraryContext==='slain'){slain.delete(key);save();toast(`已恢复：${labelOf(q)}`);renderLibrary()}else{lastSlain={key,q,wasWrong:wrong.has(key),wasSelected:selected.has(key)};slain.add(key);wrong.delete(key);selected.delete(key);save();toast(`已斩：${labelOf(q)}`,true);renderLibrary()}};actions.append(fav,action);row.append(check,no,text,actions);frag.appendChild(row)}box.appendChild(frag)
}
function libraryTrain(mode){let keys=libraryContext==='all'?[...selected]:visibleLibraryKeys;keys=keys.filter(k=>!slain.has(k));if(!keys.length){alert(libraryContext==='all'?'请先勾选题目。':'当前列表没有可训练题目。');return}startSession(mode,keys.map(k=>byKey.get(k)),libraryContext==='wrong'?'错题本':libraryContext==='favorites'?'我的收藏':'所选题目')}

function computeAnalysis(){const pool=QUIZ_DATABASE.filter(q=>!slain.has(keyOf(q))),map=new Map();for(const q of pool){if(memoryTypeOf(q)==='logic'&&q.trigger){if(!map.has(q.trigger))map.set(q.trigger,[]);map.get(q.trigger).push(q)}}const high=[...map.entries()].filter(([,qs])=>qs.length>=3).map(([trigger,qs])=>({trigger,qs})).sort((a,b)=>b.qs.length-a.qs.length||a.trigger.localeCompare(b.trigger));const rules=RULE_DEFS.map(r=>({...r,qs:pool.filter(r.test)})).filter(r=>r.qs.length);const easy=new Set();rules.forEach(g=>g.qs.forEach(q=>easy.add(keyOf(q))));const hard=pool.filter(q=>memoryTypeOf(q)==='rote').length;return{pool,high,rules,easy,hard}}
function openAnalysis(){analysisCache=computeAnalysis();const a=analysisCache;$('#analysisTotal').textContent=a.pool.length;$('#analysisHigh').textContent=a.high.length;$('#analysisRule').textContent=a.easy.size;$('#analysisHard').textContent=a.hard;const high=$('#highFreqList');high.innerHTML=a.high.slice(0,30).map((g,i)=>{const anchors=[...new Set(g.qs.map(q=>q.anchor))].slice(0,4).join('、');return`<div class="analysis-item"><div><b>【${esc(g.trigger)}】· ${g.qs.length} 题</b><small>答案锚点：${esc(anchors)}</small></div><button data-high="${i}">背这组</button></div>`}).join('')||'<div class="empty">没有达到 3 次以上的重复题眼。</div>';$('#ruleList').innerHTML=a.rules.map((r,i)=>`<div class="analysis-item"><div><b>${esc(r.title)} · ${r.qs.length} 题</b><small>${esc(r.tip)}</small></div><button data-rule="${i}">背这组</button></div>`).join('');show($('#analysisView'))}
function startHighGroup(index){const g=analysisCache&&analysisCache.high[index];if(g)startSession('memory',g.qs,`高频题眼：${g.trigger}`)}

['searchInput','libraryType'].forEach(id=>$('#'+id).addEventListener(id==='searchInput'?'input':'change',renderLibrary));
$('#selectVisible').onclick=()=>{visibleLibraryKeys.forEach(k=>selected.add(k));save();renderLibrary()};$('#invertVisible').onclick=()=>{visibleLibraryKeys.forEach(k=>selected.has(k)?selected.delete(k):selected.add(k));save();renderLibrary()};$('#clearSelected').onclick=()=>{selected.clear();save();renderLibrary()};$('#quizSelected').onclick=()=>libraryTrain('quiz');$('#memorySelected').onclick=()=>libraryTrain('memory');
$('#highFreqList').onclick=e=>{const b=e.target.closest('[data-high]');if(b)startHighGroup(Number(b.dataset.high))};$('#ruleList').onclick=e=>{const b=e.target.closest('[data-rule]');if(b)startRuleGroup(Number(b.dataset.rule))};$('#memoryHighFreq').onclick=()=>{const a=analysisCache||computeAnalysis(),seen=new Set(),qs=[];a.high.forEach(g=>g.qs.forEach(q=>{const k=keyOf(q);if(!seen.has(k)){seen.add(k);qs.push(q)}}));startSession('memory',qs,'全部高频考点')};$$('.analysisHome').forEach(b=>b.onclick=()=>{show($('#homeView'));refreshHome()});
document.addEventListener('keydown',e=>{if($('#studyView').classList.contains('hidden')||!state.session)return;if(e.key==='ArrowUp'){e.preventDefault();previousQuestion();return}if(e.key==='ArrowDown'){e.preventDefault();if(state.session.mode==='quiz'){if(answered===true)nextQuiz()}else nextMemory();return}if(state.session.mode==='quiz'){if(!answered&&['1','2','3','4'].includes(e.key)){const b=$$('.option')[Number(e.key)-1];if(b)b.click()}else if(!answered&&e.key==='Enter'&&currentQuestion&&currentQuestion.type==='multi')answerMulti();else if(answered===true&&e.key==='Enter')nextQuiz()}else if(e.key==='Enter')nextMemory()});

$('#heroQuote').textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];refreshHome();show($('#homeView'));

</script>
</body>
</html>
